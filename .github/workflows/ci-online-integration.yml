name: CI Online Integration

on:
  push:
    branches: [main]
    paths:
      - 'claw/**'
      - 'osal/**'
      - 'include/**'
      - 'drivers/**'
      - 'platform/esp32c3/**'
      - 'platform/esp32s3/**'
      - 'platform/common/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - '.github/workflows/ci-online-integration.yml'
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-online-${{ github.ref }}
  cancel-in-progress: true

jobs:
  online:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32c3-qemu
            esp_targets: esp32c3
            qemu_tools: qemu-riscv32
            make_target: test-online-esp32c3
          - target: esp32s3-qemu
            esp_targets: esp32s3
            qemu_tools: qemu-xtensa
            make_target: test-online-esp32s3

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect integration secrets
        id: secrets
        env:
          RTCLAW_AI_API_KEY: ${{ secrets.RTCLAW_AI_API_KEY }}
        run: |
          if [ -z "${RTCLAW_AI_API_KEY:-}" ]; then
            echo "::notice::Missing integration secret: RTCLAW_AI_API_KEY"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        run: scripts/ci/install-system-deps.sh qemu

      - name: Cache ESP-IDF source
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/esp/esp-idf
          key: esp-idf-src-v5.4-${{ runner.os }}

      - name: Cache ESP-IDF tools
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.espressif
          key: esp-idf-tools-v5.4-${{ runner.os }}

      - name: Ensure ESP-IDF environment
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        run: scripts/ci/setup-esp-idf.sh "${{ matrix.esp_targets }}" "${{ matrix.qemu_tools }}"

      - name: Run online integration test
        if: ${{ steps.secrets.outputs.enabled == 'true' }}
        env:
          RTCLAW_AI_API_KEY: ${{ secrets.RTCLAW_AI_API_KEY }}
          RTCLAW_AI_API_URL: ${{ vars.RTCLAW_AI_API_URL }}
          RTCLAW_AI_MODEL: ${{ vars.RTCLAW_AI_MODEL }}
          RTCLAW_AI_API_URL_SECRET: ${{ secrets.RTCLAW_AI_API_URL }}
          RTCLAW_AI_MODEL_SECRET: ${{ secrets.RTCLAW_AI_MODEL }}
        run: |
          : "${RTCLAW_AI_API_URL:=${RTCLAW_AI_API_URL_SECRET:-https://api.anthropic.com/v1/messages}}"
          : "${RTCLAW_AI_MODEL:=${RTCLAW_AI_MODEL_SECRET:-claude-sonnet-4-5}}"
          export RTCLAW_AI_API_URL RTCLAW_AI_MODEL
          source ~/esp/esp-idf/export.sh
          make ${{ matrix.make_target }}
