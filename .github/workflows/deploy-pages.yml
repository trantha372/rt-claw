name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'images/**'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy images and docs to website
        run: |
          cp -r images/ website/img/
          cp -r docs/ website/docs/

      - name: Download ESP32-S3 firmware (if available)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-firmware.yml
          name: esp32s3-firmware
          path: website/firmware/esp32s3/
          if_no_artifact_found: warn

      - name: Download ESP32-C3 firmware (if available)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-firmware.yml
          name: esp32c3-firmware
          path: website/firmware/esp32c3/
          if_no_artifact_found: warn

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - id: deployment
        uses: actions/deploy-pages@v4
